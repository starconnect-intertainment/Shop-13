<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1, viewport-fit=cover" />
  <title>🇯🇲 HOLDEST • CYBER SOCIAL ⭐</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0f;
      background-image: 
        repeating-linear-gradient(0deg, rgba(0, 255, 255, 0.02) 0px, rgba(0, 255, 255, 0.02) 1px, transparent 1px, transparent 2px),
        repeating-linear-gradient(90deg, rgba(0, 255, 255, 0.02) 0px, rgba(0, 255, 255, 0.02) 1px, transparent 1px, transparent 2px);
      min-height: 100vh;
      color: #ffffff;
    }

    .glow-text {
      text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
    }

    .nav {
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(20px);
      background: rgba(5, 5, 10, 0.85);
      border-bottom: 1px solid rgba(0, 255, 255, 0.3);
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.1);
    }

    .nav-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 24px;
      font-weight: 800;
      background: linear-gradient(135deg, #00ffff, #ff00ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #00ffff, #ff00ff);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
    }

    .user-badge {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 18px;
      background: rgba(0, 255, 255, 0.1);
      border: 1px solid rgba(0, 255, 255, 0.3);
      border-radius: 40px;
      backdrop-filter: blur(10px);
      cursor: pointer;
      transition: 0.2s;
    }
    .user-badge:hover {
      background: rgba(0, 255, 255, 0.2);
      border-color: cyan;
    }

    .user-avatar {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #00ffff, #ff00ff);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 32px 24px;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 24px;
    }

    @media (max-width: 900px) {
      .container {
        grid-template-columns: 1fr;
      }
    }

    .filter-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      background: rgba(10, 10, 20, 0.7);
      backdrop-filter: blur(10px);
      padding: 12px 20px;
      border-radius: 60px;
      border: 1px solid rgba(0, 255, 255, 0.2);
    }
    .filter-btn {
      background: none;
      border: none;
      padding: 8px 20px;
      border-radius: 40px;
      color: #aaa;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s;
    }
    .filter-btn.active {
      background: linear-gradient(135deg, #00ffff, #0088ff);
      color: #000;
    }
    .filter-btn:hover {
      color: cyan;
    }

    .cyber-card {
      background: rgba(10, 10, 20, 0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 255, 255, 0.3);
      border-radius: 20px;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .cyber-card:hover {
      border-color: rgba(0, 255, 255, 0.7);
      box-shadow: 0 0 25px rgba(0, 255, 255, 0.2);
    }

    .card-header {
      padding: 20px 24px;
      background: linear-gradient(135deg, rgba(0, 255, 255, 0.1), rgba(255, 0, 255, 0.05));
      border-bottom: 1px solid rgba(0, 255, 255, 0.2);
    }

    .card-header h2 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .card-body {
      padding: 24px;
    }

    .input-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(0, 255, 255, 0.7);
      margin-bottom: 8px;
    }

    input, textarea, select {
      width: 100%;
      padding: 12px 16px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(0, 255, 255, 0.3);
      border-radius: 12px;
      color: white;
      font-size: 14px;
      transition: all 0.2s;
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #00ffff;
      box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
    }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #00ffff, #0088ff);
      color: #000;
      font-weight: 800;
    }

    .btn-success {
      background: linear-gradient(135deg, #00ff88, #00cc66);
      color: #000;
      font-weight: 800;
    }

    .btn-danger {
      background: rgba(255, 0, 100, 0.2);
      border: 1px solid rgba(255, 0, 100, 0.5);
      color: #ff3366;
    }

    .btn-secondary {
      background: rgba(0, 255, 255, 0.15);
      border: 1px solid rgba(0, 255, 255, 0.3);
      color: #00ffff;
    }

    .btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.1);
    }

    .msg {
      margin-top: 12px;
      padding: 10px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
    }
    .msg.ok { background: rgba(0, 255, 136, 0.1); border: 1px solid rgba(0, 255, 136, 0.3); color: #00ff88; }
    .msg.err { background: rgba(255, 0, 100, 0.1); border: 1px solid rgba(255, 0, 100, 0.3); color: #ff6680; }
    .msg.muted { background: rgba(0, 255, 255, 0.05); border: 1px solid rgba(0, 255, 255, 0.2); color: rgba(0, 255, 255, 0.7); }

    .hide { display: none !important; }

    .feed {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .post {
      position: relative;
      background: #000;
      border-radius: 24px;
      overflow: hidden;
      aspect-ratio: 9 / 16;
      max-height: 80vh;
    }

    .post-media {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    video.post-media {
      object-fit: cover;
    }

    .post-overlay {
      position: absolute;
      bottom: 20px;
      left: 16px;
      right: 80px;
      z-index: 10;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    }

    .post-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .post-avatar {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #00ffff, #ff00ff);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    .post-info {
      flex: 1;
    }

    .post-author {
      font-weight: 800;
      font-size: 15px;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .star-certificate {
      display: inline-flex;
      background: linear-gradient(135deg, #ffd700, #ffaa00);
      border-radius: 50%;
      width: 20px;
      height: 20px;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 8px gold;
    }
    .star-certificate i {
      font-size: 11px;
      color: #000;
    }

    .post-time {
      font-size: 11px;
      opacity: 0.7;
    }

    .post-caption {
      font-size: 14px;
      margin-bottom: 6px;
    }

    .post-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 6px;
    }
    .tag {
      background: rgba(0, 255, 255, 0.2);
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 10px;
      color: cyan;
    }

    .post-actions {
      position: absolute;
      bottom: 20px;
      right: 12px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      z-index: 10;
    }

    .action-btn {
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      border: none;
      border-radius: 50%;
      width: 48px;
      height: 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      color: white;
      cursor: pointer;
      transition: 0.2s;
      font-size: 11px;
    }

    .action-btn i {
      font-size: 26px;
    }

    .action-btn.liked {
      color: #ff4466;
    }

    .action-btn:hover {
      transform: scale(1.05);
    }

    .sound-indicator {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      border-radius: 30px;
      padding: 8px 12px;
      font-size: 12px;
      z-index: 15;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.3);
    }

    .comments-section {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0,0,0,0.95);
      backdrop-filter: blur(20px);
      border-radius: 20px 20px 0 0;
      max-height: 55%;
      overflow-y: auto;
      z-index: 20;
      padding: 16px;
      transform: translateY(100%);
      transition: 0.3s;
    }

    .comments-section.open {
      transform: translateY(0);
    }

    .comment-input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    .comment-input-group input {
      flex: 1;
      background: #1a1a1a;
      border: none;
      border-radius: 30px;
      padding: 10px 16px;
      color: white;
    }

    .comment-input-group button {
      background: rgba(0,255,255,0.2);
      border: none;
      border-radius: 30px;
      padding: 10px 20px;
      color: #00ffff;
      cursor: pointer;
    }

    .comment-item {
      padding: 10px 0;
      border-bottom: 1px solid #222;
    }

    .comment-user {
      font-weight: bold;
      color: #00ffff;
      font-size: 12px;
    }

    .reply-btn {
      background: none;
      border: none;
      color: #888;
      font-size: 10px;
      cursor: pointer;
      margin-top: 4px;
    }
    .reply-form {
      margin-top: 8px;
      margin-left: 20px;
      display: none;
    }
    .reply-form input {
      width: calc(100% - 70px);
      padding: 6px 12px;
      font-size: 12px;
    }
    .reply-item {
      margin-left: 24px;
      padding: 6px 0;
      border-left: 2px solid cyan;
      padding-left: 12px;
      margin-top: 6px;
    }

    .loading {
      text-align: center;
      padding: 60px;
      color: rgba(0, 255, 255, 0.6);
    }

    #toastContainer {
      position: fixed;
      bottom: 30px;
      left: 20px;
      right: 20px;
      z-index: 2000;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }
    .toast {
      background: #1a1a2e;
      border-left: 4px solid #00ffff;
      padding: 12px 20px;
      border-radius: 12px;
      color: white;
      font-size: 14px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      animation: slideIn 0.3s ease;
      pointer-events: auto;
    }
    @keyframes slideIn {
      from { transform: translateX(-100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.95);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-content {
      max-width: 450px;
      width: 90%;
    }
    .close-modal {
      float: right;
      font-size: 24px;
      cursor: pointer;
      color: cyan;
    }

    #welcomeToast {
      position: fixed;
      top: 80px;
      right: 20px;
      background: linear-gradient(135deg, #00ffff, #ff00ff);
      color: #000;
      padding: 12px 24px;
      border-radius: 60px;
      font-weight: bold;
      z-index: 2000;
      animation: fadeOut 5s forwards;
    }
    @keyframes fadeOut {
      0% { opacity: 1; transform: translateX(0); }
      70% { opacity: 1; }
      100% { opacity: 0; transform: translateX(100%); display: none; }
    }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  (function() {
    const SUPABASE_URL = "https://wtsmekozfpeaixqobuik.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind0c21la296ZnBlYWl4cW9idWlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4Mjk2MjcsImV4cCI6MjA5MzQwNTYyN30.AUm9renaVr3A8pzDNx5Dm_f4XJrhkIKlnUePm6Gl5S0";
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { persistSession: true, autoRefreshToken: true }
    });

    let currentUser = null;
    let starCache = new Map();
    let currentFilter = "recent";

    // ===================== UTILS =====================
    function showToast(message, type = "info") {
      const container = document.getElementById("toastContainer");
      const toast = document.createElement("div");
      toast.className = "toast";
      toast.innerHTML = message;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function escapeHtml(s) {
      if (!s) return "";
      return String(s).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    function formatTime(date) {
      if (!date) return "";
      const d = new Date(date);
      const now = new Date();
      const diff = Math.floor((now - d) / 1000);
      if (diff < 60) return "à l'instant";
      if (diff < 3600) return `il y a ${Math.floor(diff / 60)} min`;
      if (diff < 86400) return `il y a ${Math.floor(diff / 3600)} h`;
      return d.toLocaleDateString();
    }

    // ===================== PROFIL & STAR =====================
    async function getProfile() {
      if (!supabase || !currentUser) return null;
      const { data, error } = await supabase.from("profiles").select("*").eq("id", currentUser.id).single();
      if (error) return null;
      return data;
    }

    async function getUserTotalLikesReceived(userId) {
      const { data: posts } = await supabase.from("posts").select("id").eq("user_id", userId);
      if (!posts || posts.length === 0) return 0;
      let total = 0;
      for (let p of posts) {
        const { count } = await supabase.from("likes").select("*", { count: 'exact', head: true }).eq("post_id", p.id);
        total += (count || 0);
      }
      return total;
    }

    async function hasStarEligibility(userId) {
      if (starCache.has(userId)) return starCache.get(userId);
      const totalLikes = await getUserTotalLikesReceived(userId);
      const eligible = totalLikes >= 30;
      starCache.set(userId, eligible);
      return eligible;
    }

    function invalidateStarCache(userId) { starCache.delete(userId); }

    // ===================== INTERACTIONS =====================
    async function loadPostInteractions(postId) {
      try {
        const { count: likesCount } = await supabase.from("likes").select("*", { count: 'exact', head: true }).eq("post_id", postId);
        let userLiked = false;
        if (currentUser) {
          const { data: likeData } = await supabase.from("likes").select("*").eq("post_id", postId).eq("user_id", currentUser.id).maybeSingle();
          userLiked = !!likeData;
        }
        const { data: comments } = await supabase.from("comments").select("*").eq("post_id", postId).order("created_at", { ascending: true });
        for (let c of comments) {
          const { data: replies } = await supabase.from("comment_replies").select("*").eq("comment_id", c.id).order("created_at");
          c.replies = replies || [];
        }
        return { likes: likesCount || 0, userLiked, comments: comments || [] };
      } catch(e) {
        return { likes: 0, userLiked: false, comments: [] };
      }
    }

    async function toggleLike(postId, postUserId) {
      if (!currentUser) { showToast("🔒 Connecte-toi pour liker"); return false; }
      try {
        const { data: existing } = await supabase.from("likes").select("id").eq("post_id", postId).eq("user_id", currentUser.id).maybeSingle();
        if (existing) {
          await supabase.from("likes").delete().eq("id", existing.id);
          invalidateStarCache(postUserId);
          return false;
        } else {
          await supabase.from("likes").insert({ post_id: postId, user_id: currentUser.id });
          invalidateStarCache(postUserId);
          return true;
        }
      } catch(e) { return false; }
    }

    async function addComment(postId, content, parentId = null) {
      if (!currentUser) { showToast("🔒 Connecte-toi pour commenter"); return false; }
      if (!content.trim()) return false;
      try {
        const profile = await getProfile();
        if (parentId) {
          await supabase.from("comment_replies").insert({
            comment_id: parentId,
            user_id: currentUser.id,
            username: profile?.username || "Anonyme",
            content: content.trim()
          });
        } else {
          await supabase.from("comments").insert({
            post_id: postId,
            user_id: currentUser.id,
            username: profile?.username || "Anonyme",
            content: content.trim()
          });
        }
        return true;
      } catch(e) { return false; }
    }

    // ===================== FEED =====================
    async function loadFeed() {
      const feed = document.getElementById("feed");
      if (!supabase) { feed.innerHTML = '<div class="loading">⚠️ ERREUR CONNEXION</div>'; return; }
      
      feed.innerHTML = '<div class="loading">🌀 CHARGEMENT...</div>';
      
      try {
        let query = supabase.from("posts").select("*");
        if (currentFilter === "popular") {
          // On trie après
        } else {
          query = query.order("created_at", { ascending: false });
        }
        
        const { data: posts, error } = await query;
        if (error) throw error;
        
        if (!posts || posts.length === 0) {
          feed.innerHTML = '<div class="cyber-card" style="padding: 40px; text-align: center;">📭 AUCUN POST POUR LE MOMENT</div>';
          return;
        }
        
        let postsWithLikes = await Promise.all(posts.map(async (p) => {
          const { count } = await supabase.from("likes").select("*", { count: 'exact', head: true }).eq("post_id", p.id);
          return { ...p, likeCount: count || 0 };
        }));
        
        if (currentFilter === "popular") {
          postsWithLikes.sort((a, b) => b.likeCount - a.likeCount);
        }
        
        feed.innerHTML = "";
        
        for (const post of postsWithLikes) {
          const { likes, userLiked, comments } = await loadPostInteractions(post.id);
          const hasStar = await hasStarEligibility(post.user_id);
          
          const mediaHtml = post.media_url ? (post.media_type === "video" ? `<video class="post-media" src="${escapeHtml(post.media_url)}" loop autoplay muted playsinline></video>` : `<img class="post-media" src="${escapeHtml(post.media_url)}" alt="media" />`) : `<div style="background:#1a1a1a; width:100%; height:100%; display:flex; align-items:center; justify-content:center;">📷 Pas de média</div>`;
          
          let commentsHtml = `<div class="comment-input-group">
            <input type="text" id="comment-input-${post.id}" placeholder="Écris un commentaire..." />
            <button onclick="sendComment('${post.id}')">⬆️</button>
          </div>`;
          
          for (const c of comments) {
            commentsHtml += `<div class="comment-item">
              <div class="comment-user">${escapeHtml(c.username)}</div>
              <div>${escapeHtml(c.content)}</div>
              <div style="font-size: 10px; color: #888;">${formatTime(c.created_at)}</div>
              <button class="reply-btn" onclick="showReplyForm('${c.id}')">💬 Répondre</button>
              <div id="reply-form-${c.id}" class="reply-form" style="display:none;">
                <input id="reply-input-${c.id}" type="text" placeholder="Ta réponse..." />
                <button onclick="sendReply('${c.id}', '${post.id}')">Envoyer</button>
              </div>`;
            if (c.replies && c.replies.length) {
              for (const r of c.replies) {
                commentsHtml += `<div class="reply-item">
                  <div class="comment-user">${escapeHtml(r.username)}</div>
                  <div>${escapeHtml(r.content)}</div>
                  <div style="font-size: 10px; color: #888;">${formatTime(r.created_at)}</div>
                </div>`;
              }
            }
            commentsHtml += `</div>`;
          }
          
          if (comments.length === 0) {
            commentsHtml += '<div style="text-align: center; padding: 10px; color: rgba(0,255,255,0.4); font-size: 12px;">💬 Aucun commentaire</div>';
          }
          
          const starHtml = hasStar ? `<span class="star-certificate"><i class="fas fa-star"></i></span>` : '';
          const categoryEmoji = { general: "🌟", fun: "😂", admin: "📄", galere: "😤", conseil: "💡" }[post.category] || "🔹";
          
          const postDiv = document.createElement("div");
          postDiv.className = "post";
          postDiv.innerHTML = `
            ${mediaHtml}
            <div class="sound-indicator" data-muted="true">🔇 Son coupé</div>
            <div class="post-overlay">
              <div class="post-header">
                <div class="post-avatar">${escapeHtml((post.user_username || "U")[0].toUpperCase())}</div>
                <div class="post-info">
                  <div class="post-author">
                    ${escapeHtml(post.user_username || "Utilisateur")}
                    ${starHtml}
                    <span class="tag">${categoryEmoji}</span>
                  </div>
                  <div class="post-time">${formatTime(post.created_at)}</div>
                </div>
              </div>
              ${post.caption ? `<div class="post-caption">${escapeHtml(post.caption)}</div>` : ""}
              <div class="post-tags">${post.tags ? post.tags.split(',').map(t => `<span class="tag">#${escapeHtml(t.trim())}</span>`).join('') : ""}</div>
            </div>
            <div class="post-actions">
              <button class="action-btn ${userLiked ? 'liked' : ''}" onclick="handleLike('${post.id}', '${post.user_id}')">
                <i class="fas fa-heart"></i>
                <span>${likes}</span>
              </button>
              <button class="action-btn" onclick="toggleComments('${post.id}')">
                <i class="fas fa-comment"></i>
                <span>${comments.length}</span>
              </button>
              <button class="action-btn" onclick="sharePost('${post.id}')">
                <i class="fas fa-share-alt"></i>
              </button>
              <button class="action-btn" onclick="reportPost('${post.id}')">
                <i class="fas fa-flag"></i>
              </button>
            </div>
            <div id="comments-${post.id}" class="comments-section">
              ${commentsHtml}
            </div>
          `;
          
          feed.appendChild(postDiv);
          
          const video = postDiv.querySelector('video');
          const soundIndicator = postDiv.querySelector('.sound-indicator');
          
          if(video) {
            video.muted = true;
            video.playsInline = true;
            video.autoplay = true;
            video.loop = true;
            
            const observer = new IntersectionObserver((entries) => {
              entries.forEach(entry => {
                if(entry.isIntersecting) {
                  video.play().catch(e => console.log("Auto-play:", e));
                } else {
                  video.pause();
                }
              });
            }, { threshold: 0.5 });
            observer.observe(video);
            
            if(soundIndicator) {
              soundIndicator.addEventListener('click', (e) => {
                e.stopPropagation();
                video.muted = !video.muted;
                soundIndicator.innerHTML = video.muted ? "🔇 Son coupé" : "🔊 Son activé";
                showToast(video.muted ? "🔇 Son désactivé" : "🔊 Son activé", "info");
              });
            }
          }
        }
      } catch(e) {
        console.error(e);
        feed.innerHTML = `<div class="loading">⚠️ ERREUR: ${escapeHtml(e.message)}</div>`;
      }
    }

    // ===================== GLOBAL FUNCTIONS (window) =====================
    window.handleLike = async function(postId, postUserId) {
      await toggleLike(postId, postUserId);
      await loadFeed();
    };
    window.toggleComments = function(postId) {
      const section = document.getElementById(`comments-${postId}`);
      if (section) section.classList.toggle("open");
    };
    window.sendComment = async function(postId) {
      const input = document.getElementById(`comment-input-${postId}`);
      if (input && input.value.trim()) {
        await addComment(postId, input.value);
        input.value = "";
        await loadFeed();
        const section = document.getElementById(`comments-${postId}`);
        if (section) section.classList.add("open");
      }
    };
    window.showReplyForm = function(commentId) {
      const form = document.getElementById(`reply-form-${commentId}`);
      if (form) form.style.display = form.style.display === "none" ? "block" : "none";
    };
    window.sendReply = async function(commentId, postId) {
      const input = document.getElementById(`reply-input-${commentId}`);
      if (input && input.value.trim()) {
        await addComment(postId, input.value, commentId);
        input.value = "";
        await loadFeed();
      }
    };
    window.sharePost = async function(postId) {
      const url = `${window.location.origin}?post=${postId}`;
      try {
        await navigator.clipboard.writeText(url);
        showToast("🔗 Lien copié ! Partage-le avec tes potes", "ok");
      } catch(e) {
        showToast("📱 Lien : " + url, "info");
      }
    };
    window.reportPost = async function(postId) {
      if (!currentUser) { showToast("🔒 Connecte-toi pour signaler"); return; }
      const reason = prompt("Motif du signalement :");
      if (!reason) return;
      try {
        await supabase.from("reports").insert({ post_id: postId, user_id: currentUser.id, reason });
        showToast("🚨 Signalement envoyé", "ok");
      } catch(e) { showToast("Erreur", "err"); }
    };

    // ===================== AUTH & UI =====================
    async function updateBadge() {
      const authBadgeText = document.getElementById("authBadgeText");
      const afterAuth = document.getElementById("afterAuth");
      const notAuth = document.getElementById("notAuth");
      const modalLogoutBtn = document.getElementById("modalLogoutBtn");
      
      if (currentUser) {
        const profile = await getProfile();
        const name = profile?.username || currentUser.email?.split('@')[0] || "User";
        document.querySelector("#authBadge .user-avatar").innerText = name[0].toUpperCase();
        authBadgeText.innerText = name;
        afterAuth.classList.remove("hide");
        notAuth.classList.add("hide");
        modalLogoutBtn.style.display = "block";
        if (!sessionStorage.getItem("welcomed")) {
          sessionStorage.setItem("welcomed", "true");
          const welcomeDiv = document.createElement("div");
          welcomeDiv.id = "welcomeToast";
          welcomeDiv.innerHTML = `👋 Bienvenue ${escapeHtml(name)} ! ⭐`;
          document.body.appendChild(welcomeDiv);
          setTimeout(() => welcomeDiv.remove(), 5000);
        }
      } else {
        document.querySelector("#authBadge .user-avatar").innerText = "?";
        authBadgeText.innerText = "Connexion";
        afterAuth.classList.add("hide");
        notAuth.classList.remove("hide");
        modalLogoutBtn.style.display = "none";
      }
    }

    function openAuthModal() {
      const modal = document.getElementById("authModal");
      modal.style.display = "flex";
      document.getElementById("modal_username").value = "";
      document.getElementById("modal_email").value = "";
      document.getElementById("modal_password").value = "";
      document.getElementById("modal_login_email").value = "";
      document.getElementById("modal_login_password").value = "";
      document.getElementById("modalSignupMsg").innerText = "";
      document.getElementById("modalLoginMsg").innerText = "";
    }
    window.openAuthModal = openAuthModal;
    window.closeAuthModal = function() {
      document.getElementById("authModal").style.display = "none";
    };

    // ===================== EVENT LISTENERS =====================
    document.getElementById("authBadge").addEventListener("click", openAuthModal);
    
    document.getElementById("modalSignupBtn").addEventListener("click", async () => {
      const username = document.getElementById("modal_username").value.trim();
      const email = document.getElementById("modal_email").value.trim();
      const password = document.getElementById("modal_password").value;
      const signupMsg = document.getElementById("modalSignupMsg");
      
      if (!username || !email || password.length < 6) {
        signupMsg.className = "msg err";
        signupMsg.innerText = "❌ Pseudo, email et mot de passe 6+ requis";
        return;
      }
      signupMsg.className = "msg muted";
      signupMsg.innerText = "⏳ Création...";
      const { error } = await supabase.auth.signUp({
        email, password,
        options: { data: { username } }
      });
      if (error) {
        signupMsg.className = "msg err";
        signupMsg.innerText = error.message;
      } else {
        signupMsg.className = "msg ok";
        signupMsg.innerText = "✅ Compte créé ! Connecte-toi";
      }
    });

    document.getElementById("modalLoginBtn").addEventListener("click", async () => {
      const email = document.getElementById("modal_login_email").value.trim();
      const password = document.getElementById("modal_login_password").value;
      const loginMsg = document.getElementById("modalLoginMsg");
      
      if (!email || !password) {
        loginMsg.className = "msg err";
        loginMsg.innerText = "❌ Email et mot de passe requis";
        return;
      }
      loginMsg.className = "msg muted";
      loginMsg.innerText = "⏳ Connexion...";
      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) {
        loginMsg.className = "msg err";
        loginMsg.innerText = error.message;
      } else {
        loginMsg.className = "msg ok";
        loginMsg.innerText = "✅ Connecté !";
        setTimeout(() => window.closeAuthModal(), 1000);
      }
    });

    document.getElementById("modalLogoutBtn").addEventListener("click", async () => {
      await supabase.auth.signOut();
      starCache.clear();
      window.closeAuthModal();
      showToast("👋 Déconnecté", "info");
    });

    document.getElementById("btnPublish").addEventListener("click", async () => {
      const file = document.getElementById("mediaFile").files[0];
      const caption = document.getElementById("caption").value.trim();
      const category = document.getElementById("category").value;
      const pubMsg = document.getElementById("pubMsg");
      
      if (!file) { pubMsg.className = "msg err"; pubMsg.textContent = "❌ Choisis un média"; return; }
      const mediaType = file.type.startsWith("image/") ? "image" : file.type.startsWith("video/") ? "video" : null;
      if (!mediaType) { pubMsg.className = "msg err"; pubMsg.textContent = "❌ Format non supporté"; return; }
      
      pubMsg.className = "msg muted";
      pubMsg.textContent = "⏳ Upload...";
      
      try {
        const profile = await getProfile();
        if (!profile?.username) throw new Error("Profil invalide");
        
        const ext = file.name.split('.').pop();
        const path = `public/${currentUser.id}/${Date.now()}_${Math.random().toString(36).substr(2, 6)}.${ext}`;
        const { error: uploadError } = await supabase.storage.from("media").upload(path, file);
        if (uploadError) throw uploadError;
        
        const { data: urlData } = supabase.storage.from("media").getPublicUrl(path);
        const { error: insertError } = await supabase.from("posts").insert({
          user_id: currentUser.id, user_username: profile.username, caption: caption || null,
          media_url: urlData.publicUrl, media_type: mediaType, category: category
        });
        if (insertError) throw insertError;
        
        document.getElementById("caption").value = "";
        document.getElementById("mediaFile").value = "";
        pubMsg.className = "msg ok";
        pubMsg.textContent = "✅ Publié !";
        showToast("📤 Post publié !", "ok");
        loadFeed();
      } catch(e) {
        pubMsg.className = "msg err";
        pubMsg.textContent = e.message;
        showToast(e.message, "err");
      }
    });

    document.querySelectorAll(".filter-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentFilter = btn.dataset.filter;
        loadFeed();
      });
    });

    // ===================== AUTH INIT =====================
    supabase.auth.onAuthStateChange(async (event, session) => {
      if (session?.user) {
        currentUser = session.user;
        starCache.clear();
        await updateBadge();
        loadFeed();
      } else {
        currentUser = null;
        starCache.clear();
        await updateBadge();
        loadFeed();
      }
    });

    supabase.auth.getUser().then(({ data: { user } }) => {
      currentUser = user;
      updateBadge();
      loadFeed();
    });
  })();
</script>
</body>
