<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>🇯🇲HOLDEST 🗿</title>

  <style>
    :root{
      --bg:#070A12;
      --card: rgba(255,255,255,.06);
      --card2: rgba(255,255,255,.08);
      --border: rgba(255,255,255,.14);
      --text:#EAF0FF;
      --muted: rgba(234,240,255,.70);
      --primary:#7C3AED;
      --primary2:#22C55E;
      --danger:#EF4444;
      --shadow: 0 18px 60px rgba(0,0,0,.45);
      --radius: 16px;
    }

    * { box-sizing: border-box; }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background:
        radial-gradient(900px 500px at 15% 10%, rgba(124,58,237,.35), transparent 55%),
        radial-gradient(800px 450px at 85% 25%, rgba(34,197,94,.18), transparent 60%),
        radial-gradient(700px 420px at 50% 90%, rgba(59,130,246,.16), transparent 60%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .topbar{
      max-width: 1180px;
      margin: 0 auto;
      padding: 22px 16px 8px;
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap:12px;
    }

    .brand{
      display:flex; align-items:center; gap:12px;
      font-weight: 950;
      letter-spacing: .2px;
      font-size: 22px;
    }

    .badge{
      padding: 8px 12px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 999px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .grid{
      max-width: 1180px;
      margin: 0 auto;
      padding: 14px 16px 42px;
      display:grid;
      grid-template-columns: 380px 1fr;
      gap: 16px;
    }
    @media (max-width: 980px){
      .grid{ grid-template-columns: 1fr; }
    }

    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.04));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card .hd{
      padding: 16px 16px 12px;
      border-bottom: 1px solid rgba(255,255,255,.10);
      background:
        radial-gradient(500px 160px at 20% 0%, rgba(124,58,237,.22), transparent 50%),
        radial-gradient(400px 160px at 90% 30%, rgba(34,197,94,.14), transparent 45%);
    }

    .card .hd h2{
      margin:0;
      font-size: 16px;
      letter-spacing: .2px;
      font-weight: 950;
    }

    .card .bd{ padding: 16px; }

    .row { display:flex; gap:10px; }
    .row > * { flex: 1; }

    label{
      display:block;
      margin-top: 10px;
      font-size: 12px;
      font-weight: 900;
      color: var(--muted);
    }

    input, textarea, button{
      width:100%;
      padding: 11px 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.18);
      color: var(--text);
      outline: none;
    }

    textarea{ min-height: 86px; resize: vertical; }
    input::placeholder{ color: rgba(234,240,255,.50); }

    button{
      cursor:pointer;
      font-weight: 950;
      border: 1px solid rgba(255,255,255,.14);
      transition: transform .08s ease, filter .15s ease, background .15s ease;
    }
    button:active{ transform: translateY(1px); }

    .btn-primary{
      background: linear-gradient(135deg, rgba(124,58,237,1), rgba(59,130,246,.85));
      border-color: rgba(124,58,237,.5);
    }
    .btn-secondary{
      background: rgba(255,255,255,.06);
    }
    .btn-green{
      background: linear-gradient(135deg, rgba(34,197,94,1), rgba(16,185,129,.82));
      border-color: rgba(34,197,94,.55);
    }
    .btn-danger{
      background: rgba(239,68,68,.14);
      border-color: rgba(239,68,68,.45);
      color: #ffd8d8;
    }

    .msg{
      margin-top: 10px;
      font-weight: 900;
      font-size: 13px;
      white-space: pre-wrap;
    }
    .msg.muted{ color: var(--muted); }
    .msg.ok{ color: #6EE7B7; }
    .msg.err{ color: #FF8A8A; }

    .sectionTitle{
      display:flex; align-items:center; justify-content: space-between; gap:10px;
      margin-bottom: 10px;
    }
    .sectionTitle .hint{
      font-size: 12px; color: var(--muted); font-weight: 800;
    }

    .feed{
      display:flex;
      flex-direction: column;
      gap: 14px;
    }

    .post{
      padding: 14px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 18px;
    }

    .post .meta{
      display:flex; align-items:center; justify-content: space-between;
      gap:12px; margin-bottom: 8px;
    }
    .post .author{
      font-weight: 950;
      letter-spacing: .2px;
      display:flex; align-items:center; gap:10px;
      color: var(--text);
    }
    .avatar{
      width:34px; height:34px; border-radius: 12px;
      background: linear-gradient(135deg, rgba(124,58,237,.8), rgba(34,197,94,.55));
      display:flex; align-items:center; justify-content: center;
      border: 1px solid rgba(255,255,255,.14);
      font-weight: 950;
    }

    .post .time{
      font-size: 12px;
      color: var(--muted);
      font-weight: 800;
      white-space: nowrap;
    }

    .caption{
      margin-top: 8px;
      font-weight: 850;
      line-height: 1.35;
    }

    img, video{
      margin-top: 12px;
      width:100%;
      max-height: 520px;
      object-fit: cover;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.10);
      display:block;
      background: rgba(255,255,255,.03);
    }

    .actions{
      display:flex; gap:10px; align-items:center; flex-wrap: wrap;
      margin-top: 12px;
    }

    .pill{
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.16);
      font-size: 13px;
      font-weight: 950;
      color: var(--muted);
    }

    .likeBtn{ width:auto; padding: 10px 14px; }
    .commentBox{
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,.10);
    }
    .commentRow{
      display:flex; gap:10px; align-items:center;
    }
    .commentRow input{
      margin-top:0;
      flex:1;
    }
    .commentItem{
      margin-top: 10px;
      padding: 10px;
      border-radius: 14px;
      background: rgba(0,0,0,.14);
      border: 1px solid rgba(255,255,255,.10);
    }
    .commentItem .u{
      font-weight: 950;
      font-size: 13px;
      margin-bottom: 5px;
    }
    .commentItem .c{
      font-weight: 800;
      color: rgba(234,240,255,.92);
      line-height: 1.35;
    }
    .commentItem .t{
      font-size: 12px; color: var(--muted); margin-top: 6px; font-weight: 800;
    }

    .hide{ display:none !important; }
    .spacer{ height:8px; }
  </style>
</head>

<body>
  <div class="topbar">
    <div class="brand">🇯🇲HOLDEST 🗿</div>
    <div class="badge" id="authBadge">Connecte-toi pour poster</div>
  </div>

  <div class="grid">
    <!-- Left -->
    <div class="card">
      <div class="hd">
        <h2>Compte</h2>
      </div>
      <div class="bd">

        <div id="signupForm">
          <div class="sectionTitle">
            <div style="font-weight:950;">Créer un compte</div>
            <div class="hint">Email + mot de passe</div>
          </div>

          <label>Username (pseudo)</label>
          <input id="su_username" placeholder="ex: king_tono" />

          <div class="row">
            <div>
              <label>Prénom (optionnel)</label>
              <input id="su_first" placeholder="Prénom" />
            </div>
            <div>
              <label>Nom (optionnel)</label>
              <input id="su_last" placeholder="Nom" />
            </div>
          </div>

          <label>Email</label>
          <input id="su_email" type="email" placeholder="email@exemple.com" />

          <label>Mot de passe</label>
          <input id="su_password" type="password" placeholder="••••••••" />

          <button class="btn-primary" id="btnSignup" type="button">Créer mon compte</button>
          <div id="signupMsg" class="msg muted"></div>
        </div>

        <div class="spacer"></div>

        <hr style="border:none;border-top:1px solid rgba(255,255,255,.10); margin: 14px 0;">

        <div id="loginForm">
          <div class="sectionTitle">
            <div style="font-weight:950;">Connexion</div>
            <div class="hint">Simple & rapide</div>
          </div>

          <label>Email</label>
          <input id="li_email" type="email" placeholder="email@exemple.com" />

          <label>Mot de passe</label>
          <input id="li_password" type="password" placeholder="••••••••" />

          <button class="btn-secondary" id="btnLogin" type="button">Se connecter</button>

          <div style="display:flex; gap:10px; margin-top:12px;">
            <button class="btn-secondary" id="btnReset" type="button" style="flex:1;">Mot de passe oublié</button>
            <button class="btn-danger hide" id="btnLogout" type="button" style="flex:1;">Déconnexion</button>
          </div>

          <div id="loginMsg" class="msg muted"></div>
        </div>

      </div>
    </div>

    <!-- Right -->
    <div>
      <div class="card" style="margin-bottom: 16px;">
        <div class="hd">
          <h2>Publier</h2>
        </div>
        <div class="bd">
          <div id="afterAuth" class="hide">
            <label>Caption (optionnel)</label>
            <textarea id="caption" placeholder="Écris un texte..."></textarea>

            <label>Image ou vidéo</label>
            <input id="mediaFile" type="file" accept="image/*,video/*" />

            <button class="btn-green" id="btnPublish" type="button" style="margin-top:12px;">Publier</button>
            <div id="pubMsg" class="msg muted"></div>
          </div>

          <div id="notAuth" class="">
            <div style="color:var(--muted); font-weight:850; line-height:1.35;">
              Connecte-toi pour :
              <div class="spacer"></div>
              • publier des images/vidéos
              <div>• liker</div>
              <div>• commenter</div>
            </div>
          </div>
        </div>
      </div>

      <div class="feed" id="feed"></div>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const SUPABASE_URL = "https://wtsmekozfpeaixqobuik.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind0c21la296ZnBlYWl4cW9idWlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4Mjk2MjcsImV4cCI6MjA5MzQwNTYyN30.AUm9renaVr3A8pzDNx5Dm_f4XJrhkIKlnUePm6Gl5S0";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { persistSession: true, autoRefreshToken: true }
    });

    const $ = (id) => document.getElementById(id);

    const authBadge = $("authBadge");
    const feed = $("feed");

    const signupForm = $("signupForm");
    const loginForm = $("loginForm");

    const btnSignup = $("btnSignup");
    const signupMsg = $("signupMsg");

    const btnLogin = $("btnLogin");
    const loginMsg = $("loginMsg");

    const btnLogout = $("btnLogout");

    const btnReset = $("btnReset");

    const afterAuth = $("afterAuth");
    const notAuth = $("notAuth");

    const btnPublish = $("btnPublish");
    const pubMsg = $("pubMsg");

    const captionEl = $("caption");
    const mediaFileEl = $("mediaFile");

    const su_username = $("su_username");
    const su_first = $("su_first");
    const su_last = $("su_last");
    const su_email = $("su_email");
    const su_password = $("su_password");

    const li_email = $("li_email");
    const li_password = $("li_password");

    // =============== helpers ===============
    function escapeHtml(s) {
      return String(s ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function avatarLetter(username) {
      const u = String(username ?? "").trim();
      if (!u) return "•";
      return u[0].toUpperCase();
    }

    function fileMediaType(file) {
      if (!file) return null;
      if (file.type.startsWith("image/")) return "image";
      if (file.type.startsWith("video/")) return "video";
      return null;
    }

    async function getMyProfile() {
      const { data: { user } } = await supabase.auth.getUser();
      if (!user) return null;
      const { data, error } = await supabase
        .from("profiles")
        .select("*")
        .eq("id", user.id)
        .single();
      if (error) throw error;
      return data;
    }

    // Cooldown anti "email rate limit exceeded"
    let signupCooldownUntil = 0;
    let resetCooldownUntil = 0;
    const COOLDOWN_MS = 60000;

    function nowMs(){ return Date.now(); }
    function formatSeconds(s){ return s <= 1 ? "1s" : `${s}s`; }

    // =============== data loading ===============
    async function loadFeed() {
      feed.innerHTML = "";

      const { data: posts, error } = await supabase
        .from("posts")
        .select("*")
        .order("created_at", { ascending: false });

      if (error) throw error;

      if (!posts || posts.length === 0) {
        feed.innerHTML = `
          <div class="post" style="text-align:center; color: var(--muted); font-weight: 900;">
            Aucune publication pour le moment.
          </div>
        `;
        return;
      }

      const { data: likes, error: likesErr } = await supabase
        .from("likes")
        .select("post_id,user_id");

      if (likesErr) throw likesErr;

      const likesCount = {};
      for (const l of (likes || [])) likesCount[l.post_id] = (likesCount[l.post_id] || 0) + 1;

      const { data: myData } = await supabase.auth.getUser();
      const myUserId = myData.user?.id || null;

      const likedByMe = (postId) => {
        if (!myUserId) return false;
        return (likes || []).some(l => l.post_id === postId && l.user_id === myUserId);
      };

      for (const p of posts) {
        const card = document.createElement("div");
        card.className = "post";
        const mediaHtml = p.media_url
          ? (p.media_type === "video"
              ? `<video src="${escapeHtml(p.media_url)}" controls playsinline></video>`
              : `<img src="${escapeHtml(p.media_url)}" alt="media" />`)
          : "";

        const timeStr = p.created_at ? new Date(p.created_at).toLocaleString() : "";

        card.innerHTML = `
          <div class="meta">
            <div class="author">
              <div class="avatar">${escapeHtml(avatarLetter(p.user_username))}</div>
              <div>${escapeHtml(p.user_username || "Utilisateur")}</div>
            </div>
            <div class="time">${escapeHtml(timeStr)}</div>
          </div>

          ${p.caption ? `<div class="caption">${escapeHtml(p.caption)}</div>` : ""}

          ${mediaHtml}

          <div class="actions">
            <button class="btn-secondary likeBtn" data-like="${p.id}" type="button">
              ${likedByMe(p.id) ? "❤️ Aimé" : "❤️ Like"}
            </button>
            <div class="pill">${likesCount[p.id] || 0} likes</div>
          </div>

          <div class="commentBox">
            <div class="commentRow">
              <input data-comment-input="${p.id}" placeholder="Écrire un commentaire..." />
              <button class="btn-secondary" data-comment-send="${p.id}" type="button">Envoyer</button>
            </div>
            <div data-comments="${p.id}"></div>
          </div>
        `;

        feed.appendChild(card);

        // comments load
        const { data: comments, error: cErr } = await supabase
          .from("comments")
          .select("*")
          .eq("post_id", p.id)
          .order("created_at", { ascending: true });

        if (cErr) throw cErr;

        const list = card.querySelector(`[data-comments="${p.id}"]`);
        list.innerHTML = "";
        for (const c of (comments || [])) {
          const it = document.createElement("div");
          it.className = "commentItem";
          it.innerHTML = `
            <div class="u">${escapeHtml(c.user_username || "Utilisateur")}</div>
            <div class="c">${escapeHtml(c.content || "")}</div>
            <div class="t">${escapeHtml(c.created_at ? new Date(c.created_at).toLocaleString() : "")}</div>
          `;
          list.appendChild(it);
        }

        // like toggle
        card.querySelector(`[data-like="${p.id}"]`).addEventListener("click", async () => {
          try{
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) return alert("Connecte-toi.");

            const isLiked = likedByMe(p.id);

            if (isLiked) {
              const { error: delErr } = await supabase
                .from("likes")
                .delete()
                .eq("post_id", p.id)
                .eq("user_id", user.id);
              if (delErr) throw delErr;
            } else {
              const { error: insErr } = await supabase
                .from("likes")
                .insert({ post_id: p.id, user_id: user.id });
              if (insErr) throw insErr;
            }

            await loadFeed();
          }catch(e){
            alert(e?.message || String(e));
          }
        });

        // comment send
        card.querySelector(`[data-comment-send="${p.id}"]`).addEventListener("click", async () => {
          try{
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) return alert("Connecte-toi.");

            const input = card.querySelector(`[data-comment-input="${p.id}"]`);
            const content = (input.value || "").trim();
            if (!content) return;

            const profile = await getMyProfile();
            const { error: insErr } = await supabase
              .from("comments")
              .insert({
                post_id: p.id,
                user_id: user.id,
                user_username: profile?.username || "Utilisateur",
                content
              });

            if (insErr) throw insErr;

            input.value = "";
            await loadFeed();
          }catch(e){
            alert(e?.message || String(e));
          }
        });
      }
    }

    // =============== actions ===============
    btnSignup.addEventListener("click", async () => {
      if (nowMs() < signupCooldownUntil) {
        signupMsg.className = "msg err";
        const left = Math.ceil((signupCooldownUntil - nowMs()) / 1000);
        signupMsg.textContent = `Attends encore ${formatSeconds(left)} avant de réessayer.`;
        return;
      }

      const username = su_username.value.trim();
      const first_name = su_first.value.trim();
      const last_name = su_last.value.trim();
      const email = su_email.value.trim();
      const password = su_password.value;

      if (!username) { signupMsg.className="msg err"; signupMsg.textContent="Username requis."; return; }
      if (!email) { signupMsg.className="msg err"; signupMsg.textContent="Email requis."; return; }
      if (!password) { signupMsg.className="msg err"; signupMsg.textContent="Mot de passe requis."; return; }
      if (password.length < 6) { signupMsg.className="msg err"; signupMsg.textContent="Mot de passe min 6 caractères."; return; }

      signupCooldownUntil = nowMs() + COOLDOWN_MS;

      signupMsg.className = "msg muted";
      signupMsg.textContent = "Création du compte...";

      try{
        const { error } = await supabase.auth.signUp({
          email,
          password,
          options: { data: { username, first_name: first_name || null, last_name: last_name || null } }
        });
        if (error) throw error;
        signupMsg.className = "msg ok";
        signupMsg.textContent = "Compte créé ✅ Vérifie tes emails.";
      }catch(e){
        signupMsg.className = "msg err";
        signupMsg.textContent = e?.message || String(e);
      }
    });

    btnLogin.addEventListener("click", async () => {
      loginMsg.className = "msg muted";
      loginMsg.textContent = "Connexion...";

      const email = li_email.value.trim();
      const password = li_password.value;

      try{
        if (!email) throw new Error("Email requis.");
        if (!password) throw new Error("Mot de passe requis.");

        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) throw error;

        const profile = await getMyProfile();
        authBadge.textContent = `Connecté : ${profile?.username || email}`;

        loginMsg.className = "msg ok";
        loginMsg.textContent = "Connecté ✅";

        signupForm.classList.add("hide");
        afterAuth.classList.remove("hide");
        notAuth.classList.add("hide");
        btnLogout.classList.remove("hide");

        await loadFeed();
      }catch(e){
        loginMsg.className = "msg err";
        loginMsg.textContent = e?.message || String(e);
      }
    });

    btnReset.addEventListener("click", async () => {
      if (nowMs() < resetCooldownUntil) {
        loginMsg.className = "msg err";
        const left = Math.ceil((resetCooldownUntil - nowMs()) / 1000);
        loginMsg.textContent = `Attends encore ${formatSeconds(left)} avant de réessayer.`;
        return;
      }

      const email = (li_email.value || su_email.value || "").trim();
      if (!email) return alert("Entre d’abord ton email.");

      resetCooldownUntil = nowMs() + COOLDOWN_MS;

      loginMsg.className = "msg muted";
      loginMsg.textContent = "Envoi du lien de reset...";

      try{
        const redirectTo = window.location.origin + window.location.pathname;
        const { error } = await supabase.auth.resetPasswordForEmail(email, { redirectTo });
        if (error) throw error;
        loginMsg.className = "msg ok";
        loginMsg.textContent = "Lien envoyé ✅ Vérifie tes emails.";
      }catch(e){
        loginMsg.className = "msg err";
        loginMsg.textContent = e?.message || String(e);
      }
    });

    btnLogout.addEventListener("click", async () => {
      await supabase.auth.signOut();
      authBadge.textContent = "Connecte-toi pour poster";

      signupForm.classList.remove("hide");
      afterAuth.classList.add("hide");
      notAuth.classList.remove("hide");
      btnLogout.classList.add("hide");

      feed.innerHTML = "";
      pubMsg.className = "msg muted";
      pubMsg.textContent = "";
    });

    btnPublish.addEventListener("click", async () => {
      pubMsg.className = "msg muted";
      pubMsg.textContent = "";

      try{
        const file = mediaFileEl.files[0];
        const caption = (captionEl.value || "").trim();

        if (!file) throw new Error("Choisis une image ou une vidéo.");

        const mediaType = fileMediaType(file);
        if (!mediaType) throw new Error("Type média non supporté. Utilise image/* ou video/*");

        const { data: { user } } = await supabase.auth.getUser();
        if (!user) throw new Error("Connecte-toi d’abord.");

        const profile = await getMyProfile();
        if (!profile?.username) throw new Error("Profil incomplet. Mets ton username à l’inscription.");

        pubMsg.textContent = "Upload média...";

        const ext = (file.name.includes(".") ? file.name.split(".").pop() : (mediaType === "image" ? "jpg" : "mp4")).toLowerCase();
        const path = `public/${user.id}/${crypto.randomUUID()}.${ext}`;

        const { error: upErr } = await supabase.storage
          .from("media")
          .upload(path, file, { upsert: false });

        if (upErr) throw upErr;

        const { data: urlData } = supabase.storage.from("media").getPublicUrl(path);
        const publicUrl = urlData.publicUrl;

        const { error: insErr } = await supabase.from("posts").insert({
          user_id: user.id,
          user_username: profile.username,
          caption: caption || null,
          media_url: publicUrl,
          media_type: mediaType
        });

        if (insErr) throw insErr;

        captionEl.value = "";
        mediaFileEl.value = "";
        pubMsg.className = "msg ok";
        pubMsg.textContent = "Publié ✅";

        await loadFeed();
      }catch(e){
        pubMsg.className = "msg err";
        pubMsg.textContent = e?.message || String(e);
      }
    });

    // =============== auth bootstrap ===============
    supabase.auth.onAuthStateChange(async (_event, session) => {
      if (session?.user) {
        btnLogout.classList.remove("hide");
        signupForm.classList.add("hide");
        afterAuth.classList.remove("hide");
        notAuth.classList.add("hide");

        const profile = await getMyProfile().catch(() => null);
        authBadge.textContent = `Connecté : ${profile?.username || session.user.email}`;

        await loadFeed();
      } else {
        btnLogout.classList.add("hide");
        signupForm.classList.remove("hide");
        afterAuth.classList.add("hide");
        notAuth.classList.remove("hide");
        authBadge.textContent = "Connecte-toi pour poster";
        feed.innerHTML = "";
      }
    });

    // initial check
    (async () => {
      const { data: { user } } = await supabase.auth.getUser();
      if (user) {
        btnLogout.classList.remove("hide");
        signupForm.classList.add("hide");
        afterAuth.classList.remove("hide");
        notAuth.classList.add("hide");
        const profile = await getMyProfile().catch(() => null);
        authBadge.textContent = `Connecté : ${profile?.username || user.email}`;
        await loadFeed();
      }
    })();
  </script>
</body>
</html>
