<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>🇯🇲HOLDEST 🗿</title>

  <style>
    :root{
      --bg:#070A12;
      --card: rgba(255,255,255,.06);
      --card2: rgba(255,255,255,.08);
      --border: rgba(255,255,255,.14);
      --text:#EAF0FF;
      --muted: rgba(234,240,255,.70);
      --primary:#7C3AED;
      --primary2:#22C55E;
      --danger:#EF4444;
      --shadow: 0 18px 60px rgba(0,0,0,.45);
      --radius: 16px;
    }
    * { box-sizing: border-box; }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background:
        radial-gradient(900px 500px at 15% 10%, rgba(124,58,237,.35), transparent 55%),
        radial-gradient(800px 450px at 85% 25%, rgba(34,197,94,.18), transparent 60%),
        radial-gradient(700px 420px at 50% 90%, rgba(59,130,246,.16), transparent 60%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .topbar{
      max-width: 1180px;
      margin: 0 auto;
      padding: 22px 16px 8px;
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap:12px;
    }
    .brand{
      display:flex; align-items:center; gap:12px;
      font-weight: 950;
      letter-spacing: .2px;
      font-size: 22px;
    }
    .badge{
      padding: 8px 12px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 999px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .grid{
      max-width: 1180px;
      margin: 0 auto;
      padding: 14px 16px 42px;
      display:grid;
      grid-template-columns: 380px 1fr;
      gap: 16px;
    }
    @media (max-width: 980px){
      .grid{ grid-template-columns: 1fr; }
    }

    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.04));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card .hd{
      padding: 16px 16px 12px;
      border-bottom: 1px solid rgba(255,255,255,.10);
      background:
        radial-gradient(500px 160px at 20% 0%, rgba(124,58,237,.22), transparent 50%),
        radial-gradient(400px 160px at 90% 30%, rgba(34,197,94,.14), transparent 45%);
    }

    .card .hd h2{
      margin:0;
      font-size: 16px;
      letter-spacing: .2px;
      font-weight: 950;
    }

    .card .bd{ padding: 16px; }

    .row { display:flex; gap:10px; }
    .row > * { flex: 1; }

    label{
      display:block;
      margin-top: 10px;
      font-size: 12px;
      font-weight: 900;
      color: var(--muted);
    }

    input, textarea, button{
      width:100%;
      padding: 11px 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.18);
      color: var(--text);
      outline: none;
    }

    textarea{ min-height: 86px; resize: vertical; }
    input::placeholder{ color: rgba(234,240,255,.50); }

    button{
      cursor:pointer;
      font-weight: 950;
      border: 1px solid rgba(255,255,255,.14);
      transition: transform .08s ease, filter .15s ease, background .15s ease;
    }
    button:active{ transform: translateY(1px); }

    .btn-primary{
      background: linear-gradient(135deg, rgba(124,58,237,1), rgba(59,130,246,.85));
      border-color: rgba(124,58,237,.5);
    }
    .btn-secondary{
      background: rgba(255,255,255,.06);
    }
    .btn-green{
      background: linear-gradient(135deg, rgba(34,197,94,1), rgba(16,185,129,.82));
      border-color: rgba(34,197,94,.55);
    }
    .btn-danger{
      background: rgba(239,68,68,.14);
      border-color: rgba(239,68,68,.45);
      color: #ffd8d8;
    }

    .msg{
      margin-top: 10px;
      font-weight: 900;
      font-size: 13px;
      white-space: pre-wrap;
    }
    .msg.muted{ color: var(--muted); }
    .msg.ok{ color: #6EE7B7; }
    .msg.err{ color: #FF8A8A; }

    .sectionTitle{
      display:flex; align-items:center; justify-content: space-between; gap:10px;
      margin-bottom: 10px;
    }
    .sectionTitle .hint{
      font-size: 12px; color: var(--muted); font-weight: 800;
    }

    .feed{
      display:flex;
      flex-direction: column;
      gap: 14px;
    }

    .post{
      padding: 14px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 18px;
    }

    .post .meta{
      display:flex; align-items:center; justify-content: space-between;
      gap:12px; margin-bottom: 8px;
    }
    .post .author{
      font-weight: 950;
      letter-spacing: .2px;
      display:flex; align-items:center; gap:10px;
      color: var(--text);
    }
    .avatar{
      width:34px; height:34px; border-radius: 12px;
      background: linear-gradient(135deg, rgba(124,58,237,.8), rgba(34,197,94,.55));
      display:flex; align-items:center; justify-content: center;
      border: 1px solid rgba(255,255,255,.14);
      font-weight: 950;
    }

    .post .time{
      font-size: 12px;
      color: var(--muted);
      font-weight: 800;
      white-space: nowrap;
    }

    .caption{
      margin-top: 8px;
      font-weight: 850;
      line-height: 1.35;
    }

    img, video{
      margin-top: 12px;
      width:100%;
      max-height: 520px;
      object-fit: cover;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.10);
      display:block;
      background: rgba(255,255,255,.03);
    }
    video{ object-fit: contain; }

    .actions{
      display:flex; gap:10px; align-items:center; flex-wrap: wrap;
      margin-top: 12px;
    }

    .likeBtn{
      width:auto;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.16);
      color: var(--muted);
      font-weight: 950;
    }
    .likeBtn.liked{
      background: rgba(239,68,68,.18);
      border-color: rgba(239,68,68,.55);
      color: #ffd8d8;
    }

    .commentBox{
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,.10);
    }
    .commentRow{
      display:flex; gap:10px; align-items:center;
    }
    .commentRow input{
      margin-top:0;
      flex:1;
    }
    .commentItem{
      margin-top: 10px;
      padding: 10px;
      border-radius: 14px;
      background: rgba(0,0,0,.14);
      border: 1px solid rgba(255,255,255,.10);
    }
    .commentItem .u{
      font-weight: 950;
      font-size: 13px;
      margin-bottom: 5px;
    }
    .commentItem .c{
      font-weight: 800;
      color: rgba(234,240,255,.92);
      line-height: 1.35;
      word-break: break-word;
    }
    .commentItem .t{
      font-size: 12px; color: var(--muted); margin-top: 6px; font-weight: 800;
    }

    .hide{ display:none !important; }
    .spacer{ height:8px; }

    .loading { text-align: center; padding: 40px; color: var(--muted); }
    .error-msg { color: #FF8A8A; text-align: center; padding: 20px; font-weight: 900; }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
  <div class="topbar">
    <div class="brand">🇯🇲HOLDEST 🗿</div>
    <div class="badge" id="authBadge">Chargement...</div>
  </div>

  <div class="grid">
    <div class="card">
      <div class="hd"><h2>Compte</h2></div>
      <div class="bd">
        <div id="signupForm">
          <div class="sectionTitle">
            <div style="font-weight:950;">Créer un compte</div>
            <div class="hint">Email + mot de passe</div>
          </div>

          <label>Username (pseudo)</label>
          <input id="su_username" placeholder="ex: king_tono" />

          <div class="row">
            <div>
              <label>Prénom (optionnel)</label>
              <input id="su_first" placeholder="Prénom" />
            </div>
            <div>
              <label>Nom (optionnel)</label>
              <input id="su_last" placeholder="Nom" />
            </div>
          </div>

          <label>Email</label>
          <input id="su_email" type="email" placeholder="email@exemple.com" />

          <label>Mot de passe</label>
          <input id="su_password" type="password" placeholder="••••••••" />

          <button class="btn-primary" id="btnSignup">Créer mon compte</button>
          <div id="signupMsg" class="msg muted"></div>
        </div>

        <div class="spacer"></div>
        <hr style="border:none;border-top:1px solid rgba(255,255,255,.10); margin: 14px 0;">

        <div id="loginForm">
          <div class="sectionTitle">
            <div style="font-weight:950;">Connexion</div>
            <div class="hint">Simple & rapide</div>
          </div>

          <label>Email</label>
          <input id="li_email" type="email" placeholder="email@exemple.com" />

          <label>Mot de passe</label>
          <input id="li_password" type="password" placeholder="••••••••" />

          <button class="btn-secondary" id="btnLogin">Se connecter</button>

          <div style="display:flex; gap:10px; margin-top:12px;">
            <button class="btn-secondary" id="btnReset" style="flex:1;">Mot de passe oublié</button>
            <button class="btn-danger hide" id="btnLogout" style="flex:1;">Déconnexion</button>
          </div>

          <div id="loginMsg" class="msg muted"></div>
        </div>
      </div>
    </div>

    <div>
      <div class="card" style="margin-bottom: 16px;">
        <div class="hd"><h2>Publier</h2></div>
        <div class="bd">
          <div id="afterAuth" class="hide">
            <label>Caption (optionnel)</label>
            <textarea id="caption" placeholder="Écris un texte..."></textarea>

            <label>Image ou vidéo</label>
            <input id="mediaFile" type="file" accept="image/*,video/*" />

            <button class="btn-green" id="btnPublish" style="margin-top:12px;">Publier</button>
            <div id="pubMsg" class="msg muted"></div>
          </div>

          <div id="notAuth">
            <div style="color:var(--muted); font-weight:850; line-height:1.35;">
              🔒 Connecte-toi pour publier
              <div class="spacer"></div>
              • Partager des images/vidéos
              <div>• Liker les publications</div>
              <div>• Commenter</div>
            </div>
          </div>
        </div>
      </div>

      <div id="feed" class="feed">
        <div class="loading">Chargement des publications...</div>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const SUPABASE_URL = "https://wtsmekozfpeaixqobuik.supabase.co";
      const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind0c21la296ZnBlYWl4cW9idWlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4Mjk2MjcsImV4cCI6MjA5MzQwNTYyN30.AUm9renaVr3A8pzDNx5Dm_f4XJrhkIKlnUePm6Gl5S0";
      const redirectTo = "https://starconnect-intertainment.github.io/Shop-13/";

      const authBadge = document.getElementById("authBadge");
      const feed = document.getElementById("feed");

      // Gestionnaire d'erreurs global
      window.addEventListener("error", (e) => {
        console.error("Page error:", e.error || e.message);
        if (feed && feed.innerHTML === '') {
          feed.innerHTML = `<div class="error-msg">⚠️ Erreur: ${e.message || "inconnue"}</div>`;
        }
      });

      let supabase = null;
      try {
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
          auth: { persistSession: true, autoRefreshToken: true }
        });
      } catch (e) {
        console.error("Erreur chargement Supabase:", e);
        feed.innerHTML = '<div class="error-msg">⚠️ Erreur: impossible de charger Supabase.</div>';
        return;
      }

      const signupForm = document.getElementById("signupForm");
      const btnSignup = document.getElementById("btnSignup");
      const signupMsg = document.getElementById("signupMsg");
      const btnLogin = document.getElementById("btnLogin");
      const loginMsg = document.getElementById("loginMsg");
      const btnLogout = document.getElementById("btnLogout");
      const btnReset = document.getElementById("btnReset");
      const afterAuth = document.getElementById("afterAuth");
      const notAuth = document.getElementById("notAuth");
      const btnPublish = document.getElementById("btnPublish");
      const pubMsg = document.getElementById("pubMsg");
      const captionEl = document.getElementById("caption");
      const mediaFileEl = document.getElementById("mediaFile");
      const su_username = document.getElementById("su_username");
      const su_first = document.getElementById("su_first");
      const su_last = document.getElementById("su_last");
      const su_email = document.getElementById("su_email");
      const su_password = document.getElementById("su_password");
      const li_email = document.getElementById("li_email");
      const li_password = document.getElementById("li_password");

      // Cache pour éviter les appels répétés
      let currentUser = null;
      let currentProfile = null;

      function escapeHtml(s) {
        if (!s) return "";
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function avatarLetter(username) {
        const u = String(username || "").trim();
        if (!u) return "•";
        return u[0].toUpperCase();
      }

      function fileMediaType(file) {
        if (!file) return null;
        if (file.type?.startsWith("image/")) return "image";
        if (file.type?.startsWith("video/")) return "video";
        return null;
      }

      async function getMyProfile() {
        if (currentProfile) return currentProfile;
        
        const { data: { user } } = await supabase.auth.getUser();
        if (!user) return null;

        const { data, error } = await supabase
          .from("profiles")
          .select("*")
          .eq("id", user.id)
          .single();

        if (error) return null;
        currentProfile = data;
        return data;
      }

      async function getSessionUser() {
        if (currentUser) return currentUser;
        
        const { data: { user } } = await supabase.auth.getUser();
        currentUser = user || null;
        return currentUser;
      }

      async function countLikes(postId) {
        const { count, error } = await supabase
          .from("likes")
          .select("*", { count: "exact", head: true })
          .eq("post_id", postId);

        if (error) return 0;
        return count || 0;
      }

      async function loadComments(postId, limit = 50) {
        const { data, error } = await supabase
          .from("comments")
          .select("id, user_username, content, created_at")
          .eq("post_id", postId)
          .order("created_at", { ascending: true })
          .limit(limit);

        if (error) return [];
        return data || [];
      }

      async function toggleLike(postId) {
        const user = await getSessionUser();
        const userIdOrNull = user ? user.id : null;

        // Vérifier si déjà liké
        let query = supabase.from("likes").select("id").eq("post_id", postId);
        
        if (userIdOrNull === null) {
          query = query.is("user_id", null);
        } else {
          query = query.eq("user_id", userIdOrNull);
        }
        
        const { data: existingLike } = await query.maybeSingle();

        if (existingLike) {
          // Supprimer le like
          const { error: delErr } = await supabase
            .from("likes")
            .delete()
            .eq("id", existingLike.id);

          if (delErr) throw delErr;
          return { liked: false };
        } else {
          // Ajouter le like
          const { error: insErr } = await supabase.from("likes").insert({
            post_id: postId,
            user_id: userIdOrNull
          });

          if (insErr) throw insErr;
          return { liked: true };
        }
      }

      async function addComment(postId, text) {
        const clean = (text || "").trim();
        if (!clean) throw new Error("Écris un commentaire.");

        const user = await getSessionUser();
        const userIdOrNull = user ? user.id : null;

        let user_username = "Anonyme";
        if (user) {
          const profile = await getMyProfile();
          user_username = profile?.username || user.email || "Utilisateur";
        }

        const { error } = await supabase.from("comments").insert({
          post_id: postId,
          user_id: userIdOrNull,
          user_username,
          content: clean
        });

        if (error) throw error;
        return true;
      }

      async function loadFeed() {
        feed.innerHTML = '<div class="loading">Chargement des publications...</div>';

        try {
          const { data: posts, error } = await supabase
            .from("posts")
            .select("*")
            .order("created_at", { ascending: false });

          if (error) throw error;

          if (!posts || posts.length === 0) {
            feed.innerHTML = '<div class="post" style="text-align:center; color: var(--muted);">📭 Aucune publication pour le moment.</div>';
            return;
          }

          const user = await getSessionUser();
          const userId = user ? user.id : null;

          // Récupérer tous les likes en une seule requête
          const postIds = posts.map(p => p.id);
          const { data: allLikes } = await supabase
            .from("likes")
            .select("post_id, user_id")
            .in("post_id", postIds);

          // Récupérer tous les commentaires en une seule requête
          const { data: allComments } = await supabase
            .from("comments")
            .select("*")
            .in("post_id", postIds)
            .order("created_at", { ascending: true });

          // Créer des maps pour un accès rapide
          const likesMap = new Map();
          const commentsMap = new Map();

          if (allLikes) {
            allLikes.forEach(like => {
              if (!likesMap.has(like.post_id)) {
                likesMap.set(like.post_id, { count: 0, userLiked: false });
              }
              const data = likesMap.get(like.post_id);
              data.count++;
              if (userId && like.user_id === userId) {
                data.userLiked = true;
              }
            });
          }

          if (allComments) {
            allComments.forEach(comment => {
              if (!commentsMap.has(comment.post_id)) {
                commentsMap.set(comment.post_id, []);
              }
              commentsMap.get(comment.post_id).push(comment);
            });
          }

          feed.innerHTML = "";

          for (const p of posts) {
            const card = document.createElement("div");
            card.className = "post";

            const timeStr = p.created_at ? new Date(p.created_at).toLocaleString() : "";
            const username = p.user_username || "Utilisateur";
            
            const likesData = likesMap.get(p.id) || { count: 0, userLiked: false };
            const commentsList = commentsMap.get(p.id) || [];

            const mediaHtml = p.media_url
              ? (p.media_type === "video"
                ? `<video src="${escapeHtml(p.media_url)}" controls playsinline></video>`
                : `<img src="${escapeHtml(p.media_url)}" alt="media" loading="lazy" />`)
              : "";

            const postId = p.id;
            const likeBtnId = `likeBtn-${postId}`;
            const likesCountId = `likesCount-${postId}`;
            const commentsBoxId = `commentsBox-${postId}`;
            const commentInputId = `commentInput-${postId}`;

            card.innerHTML = `
              <div class="meta">
                <div class="author">
                  <div class="avatar">${escapeHtml(avatarLetter(username))}</div>
                  <div>${escapeHtml(username)}</div>
                </div>
                <div class="time">${escapeHtml(timeStr)}</div>
              </div>
              ${p.caption ? `<div class="caption">${escapeHtml(p.caption)}</div>` : ""}
              ${mediaHtml}
              <div class="actions">
                <button class="likeBtn ${likesData.userLiked ? 'liked' : ''}" id="${likeBtnId}" data-postid="${postId}">
                  ❤️ <span id="${likesCountId}">${likesData.count}</span>
                </button>
              </div>
              <div class="commentBox">
                <div class="commentRow">
                  <input id="${commentInputId}" placeholder="${user ? 'Écrire un commentaire...' : 'Connectez-vous pour commenter'}" ${!user ? 'disabled' : ''} />
                  <button class="btn-secondary" data-postid="${postId}" id="btnComment-${postId}" style="flex:0 0 auto; width:auto; padding:10px 14px;" ${!user ? 'disabled' : ''}>
                    Envoyer
                  </button>
                </div>
                <div id="${commentsBoxId}">
                  ${commentsList.length > 0 ? commentsList.map(c => `
                    <div class="commentItem">
                      <div class="u">${escapeHtml(c.user_username || 'Utilisateur')}</div>
                      <div class="c">${escapeHtml(c.content || '')}</div>
                      <div class="t">${c.created_at ? escapeHtml(new Date(c.created_at).toLocaleString()) : ''}</div>
                    </div>
                  `).join("") : '<div style="color:var(--muted); font-weight:850; margin-top:10px;">Pas encore de commentaires.</div>'}
                </div>
              </div>
            `;

            feed.appendChild(card);

            // Attacher les événements après ajout au DOM
            const likeBtn = document.getElementById(likeBtnId);
            if (likeBtn) {
              likeBtn.addEventListener("click", async (e) => {
                e.preventDefault();
                try {
                  const result = await toggleLike(postId);
                  const newCount = await countLikes(postId);
                  document.getElementById(likesCountId).textContent = newCount;
                  likeBtn.classList.toggle("liked", result.liked);
                } catch (err) {
                  console.error("Like error:", err);
                  alert("Erreur: " + (err.message || "Impossible de liker"));
                }
              });
            }

            const commentBtn = document.getElementById(`btnComment-${postId}`);
            if (commentBtn) {
              commentBtn.addEventListener("click", async () => {
                const input = document.getElementById(commentInputId);
                if (!input.value.trim()) {
                  alert("Écrivez un commentaire!");
                  return;
                }
                try {
                  await addComment(postId, input.value);
                  input.value = "";
                  
                  // Recharger uniquement les commentaires pour ce post
                  const newComments = await loadComments(postId);
                  const commentsBox = document.getElementById(commentsBoxId);
                  if (commentsBox) {
                    commentsBox.innerHTML = newComments.length > 0 ? newComments.map(c => `
                      <div class="commentItem">
                        <div class="u">${escapeHtml(c.user_username || 'Utilisateur')}</div>
                        <div class="c">${escapeHtml(c.content || '')}</div>
                        <div class="t">${c.created_at ? escapeHtml(new Date(c.created_at).toLocaleString()) : ''}</div>
                      </div>
                    `).join("") : '<div style="color:var(--muted); font-weight:850; margin-top:10px;">Pas encore de commentaires.</div>';
                  }
                } catch (err) {
                  console.error("Comment error:", err);
                  alert("Erreur: " + (err.message || "Impossible de commenter"));
                }
              });
            }
          }
        } catch (error) {
          console.error("Erreur chargement feed:", error);
          feed.innerHTML = `<div class="error-msg">⚠️ Erreur: ${escapeHtml(error?.message || String(error))}</div>`;
        }
      }

      function setLoggedUI(isLogged) {
        if (isLogged) {
          signupForm?.classList.add("hide");
          afterAuth?.classList.remove("hide");
          notAuth?.classList.add("hide");
          btnLogout?.classList.remove("hide");
        } else {
          signupForm?.classList.remove("hide");
          afterAuth?.classList.add("hide");
          notAuth?.classList.remove("hide");
          btnLogout?.classList.add("hide");
          currentUser = null;
          currentProfile = null;
        }
      }

      btnSignup.addEventListener("click", async () => {
        try {
          const username = su_username.value.trim();
          const first_name = su_first.value.trim();
          const last_name = su_last.value.trim();
          const email = su_email.value.trim();
          const password = su_password.value;

          if (!username) throw new Error("Username requis.");
          if (!email) throw new Error("Email requis.");
          if (!password) throw new Error("Mot de passe requis.");
          if (password.length < 6) throw new Error("Mot de passe min 6 caractères.");

          signupMsg.className = "msg muted";
          signupMsg.textContent = "Création du compte...";

          const { error } = await supabase.auth.signUp({
            email,
            password,
            options: {
              data: { username, first_name: first_name || null, last_name: last_name || null }
            }
          });

          if (error) throw error;

          signupMsg.className = "msg ok";
          signupMsg.textContent = "Compte créé ✅ Vérifie tes emails.";
        } catch (e) {
          signupMsg.className = "msg err";
          signupMsg.textContent = e?.message || String(e);
        }
      });

      btnLogin.addEventListener("click", async () => {
        try {
          loginMsg.className = "msg muted";
          loginMsg.textContent = "Connexion...";

          const email = li_email.value.trim();
          const password = li_password.value;

          if (!email) throw new Error("Email requis.");
          if (!password) throw new Error("Mot de passe requis.");

          const { error } = await supabase.auth.signInWithPassword({ email, password });
          if (error) throw error;

          currentUser = null;
          currentProfile = null;
          
          const profile = await getMyProfile();
          authBadge.textContent = `Connecté : ${profile?.username || email}`;

          loginMsg.className = "msg ok";
          loginMsg.textContent = "Connecté ✅";
          setLoggedUI(true);
          await loadFeed();
        } catch (e) {
          loginMsg.className = "msg err";
          loginMsg.textContent = e?.message || String(e);
        }
      });

      btnLogout.addEventListener("click", async () => {
        await supabase.auth.signOut();
        currentUser = null;
        currentProfile = null;
        authBadge.textContent = "Connecte-toi pour interagir";
        setLoggedUI(false);
        await loadFeed();
      });

      btnReset.addEventListener("click", async () => {
        const email = (li_email.value || su_email.value || "").trim();
        if (!email) return alert("Entre d’abord ton email.");

        try {
          const { error } = await supabase.auth.resetPasswordForEmail(email, { redirectTo });
          if (error) throw error;
          alert("Lien de réinitialisation envoyé ✅ Vérifie tes emails.");
        } catch (e) {
          alert(e?.message || String(e));
        }
      });

      btnPublish.addEventListener("click", async () => {
        try {
          pubMsg.className = "msg muted";
          pubMsg.textContent = "";

          const file = mediaFileEl.files[0];
          const caption = (captionEl.value || "").trim();

          if (!file) throw new Error("Choisis une image ou une vidéo.");

          const mediaType = fileMediaType(file);
          if (!mediaType) throw new Error("Type média non supporté.");

          const user = await getSessionUser();
          if (!user) throw new Error("Connecte-toi d’abord.");

          const profile = await getMyProfile();
          if (!profile?.username) throw new Error("Profil incomplet.");

          pubMsg.textContent = "Upload média...";

          const bucket = "media";
          const ext = (file.name.split('.').pop() || (mediaType === "image" ? "jpg" : "mp4")).toLowerCase();
          const uid = Date.now() + '-' + Math.random().toString(36).substr(2, 9);
          const path = `public/${user.id}/${uid}.${ext}`;

          const { error: upErr } = await supabase.storage.from(bucket).upload(path, file, { upsert: false });
          if (upErr) throw upErr;

          const { data: urlData } = supabase.storage.from(bucket).getPublicUrl(path);
          const publicUrl = urlData.publicUrl;

          const { error: insErr } = await supabase.from("posts").insert({
            user_id: user.id,
            user_username: profile.username,
            caption: caption || null,
            media_url: publicUrl,
            media_type: mediaType
          });

          if (insErr) throw insErr;

          captionEl.value = "";
          mediaFileEl.value = "";
          pubMsg.className = "msg ok";
          pubMsg.textContent = "Publié ✅";

          await loadFeed();
        } catch (e) {
          pubMsg.className = "msg err";
          pubMsg.textContent = e?.message || String(e);
        }
      });

      // Écouter les changements d'authentification
      supabase.auth.onAuthStateChange(async (event, session) => {
        currentUser = null;
        currentProfile = null;
        
        if (session?.user) {
          setLoggedUI(true);
          const profile = await getMyProfile();
          authBadge.textContent = `Connecté : ${profile?.username || session.user.email}`;
          await loadFeed();
        } else {
          setLoggedUI(false);
          authBadge.textContent = "Connecte-toi pour interagir";
          await loadFeed();
        }
      });

      // Initialisation
      const { data: { user } } = await supabase.auth.getUser();
      if (user) {
        currentUser = user;
        const profile = await getMyProfile();
        if (profile) currentProfile = profile;
        authBadge.textContent = `Connecté : ${profile?.username || user.email}`;
        setLoggedUI(true);
      } else {
        authBadge.textContent = "Connecte-toi pour interagir";
        setLoggedUI(false);
      }
      
      await loadFeed();
    });
  </script>
</body>
</html>
