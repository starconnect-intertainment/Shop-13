<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>🇯🇲HOLDEST 🗿</title>

  <style>
    :root{
      --bg:#070A12;
      --card: rgba(255,255,255,.06);
      --card2: rgba(255,255,255,.08);
      --border: rgba(255,255,255,.14);
      --text:#EAF0FF;
      --muted: rgba(234,240,255,.70);
      --primary:#7C3AED;
      --primary2:#22C55E;
      --danger:#EF4444;
      --shadow: 0 18px 60px rgba(0,0,0,.45);
      --radius: 16px;
    }
    * { box-sizing: border-box; }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background:
        radial-gradient(900px 500px at 15% 10%, rgba(124,58,237,.35), transparent 55%),
        radial-gradient(800px 450px at 85% 25%, rgba(34,197,94,.18), transparent 60%),
        radial-gradient(700px 420px at 50% 90%, rgba(59,130,246,.16), transparent 60%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .topbar{
      max-width: 1180px;
      margin: 0 auto;
      padding: 22px 16px 8px;
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap:12px;
    }
    .brand{
      display:flex; align-items:center; gap:12px;
      font-weight: 950;
      letter-spacing: .2px;
      font-size: 22px;
    }
    .badge{
      padding: 8px 12px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 999px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .grid{
      max-width: 1180px;
      margin: 0 auto;
      padding: 14px 16px 42px;
      display:grid;
      grid-template-columns: 380px 1fr;
      gap: 16px;
    }
    @media (max-width: 980px){
      .grid{ grid-template-columns: 1fr; }
    }

    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.04));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card .hd{
      padding: 16px 16px 12px;
      border-bottom: 1px solid rgba(255,255,255,.10);
      background:
        radial-gradient(500px 160px at 20% 0%, rgba(124,58,237,.22), transparent 50%),
        radial-gradient(400px 160px at 90% 30%, rgba(34,197,94,.14), transparent 45%);
    }

    .card .hd h2{
      margin:0;
      font-size: 16px;
      letter-spacing: .2px;
      font-weight: 950;
    }

    .card .bd{ padding: 16px; }

    .row { display:flex; gap:10px; }
    .row > * { flex: 1; }

    label{
      display:block;
      margin-top: 10px;
      font-size: 12px;
      font-weight: 900;
      color: var(--muted);
    }

    input, textarea, button{
      width:100%;
      padding: 11px 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.18);
      color: var(--text);
      outline: none;
    }

    textarea{ min-height: 86px; resize: vertical; }
    input::placeholder{ color: rgba(234,240,255,.50); }

    button{
      cursor:pointer;
      font-weight: 950;
      border: 1px solid rgba(255,255,255,.14);
      transition: transform .08s ease, filter .15s ease, background .15s ease;
    }
    button:active{ transform: translateY(1px); }

    .btn-primary{
      background: linear-gradient(135deg, rgba(124,58,237,1), rgba(59,130,246,.85));
      border-color: rgba(124,58,237,.5);
    }
    .btn-secondary{
      background: rgba(255,255,255,.06);
    }
    .btn-green{
      background: linear-gradient(135deg, rgba(34,197,94,1), rgba(16,185,129,.82));
      border-color: rgba(34,197,94,.55);
    }
    .btn-danger{
      background: rgba(239,68,68,.14);
      border-color: rgba(239,68,68,.45);
      color: #ffd8d8;
    }

    .msg{
      margin-top: 10px;
      font-weight: 900;
      font-size: 13px;
      white-space: pre-wrap;
    }
    .msg.muted{ color: var(--muted); }
    .msg.ok{ color: #6EE7B7; }
    .msg.err{ color: #FF8A8A; }

    .sectionTitle{
      display:flex; align-items:center; justify-content: space-between; gap:10px;
      margin-bottom: 10px;
    }
    .sectionTitle .hint{
      font-size: 12px; color: var(--muted); font-weight: 800;
    }

    .feed{
      display:flex;
      flex-direction: column;
      gap: 14px;
    }

    .post{
      padding: 14px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 18px;
    }

    .post .meta{
      display:flex; align-items:center; justify-content: space-between;
      gap:12px; margin-bottom: 8px;
    }
    .post .author{
      font-weight: 950;
      letter-spacing: .2px;
      display:flex; align-items:center; gap:10px;
      color: var(--text);
    }
    .avatar{
      width:34px; height:34px; border-radius: 12px;
      background: linear-gradient(135deg, rgba(124,58,237,.8), rgba(34,197,94,.55));
      display:flex; align-items:center; justify-content: center;
      border: 1px solid rgba(255,255,255,.14);
      font-weight: 950;
    }

    .post .time{
      font-size: 12px;
      color: var(--muted);
      font-weight: 800;
      white-space: nowrap;
    }

    .caption{
      margin-top: 8px;
      font-weight: 850;
      line-height: 1.35;
    }

    img, video{
      margin-top: 12px;
      width:100%;
      max-height: 520px;
      object-fit: cover;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.10);
      display:block;
      background: rgba(255,255,255,.03);
    }
    video{ object-fit: contain; }

    .actions{
      display:flex; gap:10px; align-items:center; flex-wrap: wrap;
      margin-top: 12px;
    }

    .likeBtn{
      width:auto;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.16);
      color: var(--muted);
      font-weight: 950;
      cursor: pointer;
    }
    .likeBtn.liked{
      background: rgba(239,68,68,.18);
      border-color: rgba(239,68,68,.55);
      color: #ffd8d8;
    }

    .commentBox{
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,.10);
    }
    .commentRow{
      display:flex; gap:10px; align-items:center;
    }
    .commentRow input{
      margin-top:0;
      flex:1;
    }
    .commentItem{
      margin-top: 10px;
      padding: 10px;
      border-radius: 14px;
      background: rgba(0,0,0,.14);
      border: 1px solid rgba(255,255,255,.10);
    }
    .commentItem .u{
      font-weight: 950;
      font-size: 13px;
      margin-bottom: 5px;
    }
    .commentItem .c{
      font-weight: 800;
      color: rgba(234,240,255,.92);
      line-height: 1.35;
      word-break: break-word;
    }
    .commentItem .t{
      font-size: 12px; color: var(--muted); margin-top: 6px; font-weight: 800;
    }

    .hide{ display:none !important; }
    .spacer{ height:8px; }

    .loading { text-align: center; padding: 40px; color: var(--muted); }
    .error-msg { color: #FF8A8A; text-align: center; padding: 20px; font-weight: 900; }

    /* Améliorations pour Edge */
    button, .likeBtn {
      transition: all 0.2s ease;
    }
    img, video {
      max-width: 100%;
      height: auto;
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
  <div class="topbar">
    <div class="brand">🇯🇲HOLDEST 🗿</div>
    <div class="badge" id="authBadge">Chargement...</div>
  </div>

  <div class="grid">
    <div class="card">
      <div class="hd"><h2>Compte</h2></div>
      <div class="bd">
        <div id="signupForm">
          <div class="sectionTitle">
            <div style="font-weight:950;">Créer un compte</div>
            <div class="hint">Email + mot de passe</div>
          </div>

          <label>Username (pseudo)</label>
          <input id="su_username" placeholder="ex: king_tono" />

          <div class="row">
            <div>
              <label>Prénom (optionnel)</label>
              <input id="su_first" placeholder="Prénom" />
            </div>
            <div>
              <label>Nom (optionnel)</label>
              <input id="su_last" placeholder="Nom" />
            </div>
          </div>

          <label>Email</label>
          <input id="su_email" type="email" placeholder="email@exemple.com" />

          <label>Mot de passe</label>
          <input id="su_password" type="password" placeholder="••••••••" />

          <button class="btn-primary" id="btnSignup">Créer mon compte</button>
          <div id="signupMsg" class="msg muted"></div>
        </div>

        <div class="spacer"></div>
        <hr style="border:none;border-top:1px solid rgba(255,255,255,.10); margin: 14px 0;">

        <div id="loginForm">
          <div class="sectionTitle">
            <div style="font-weight:950;">Connexion</div>
            <div class="hint">Simple & rapide</div>
          </div>

          <label>Email</label>
          <input id="li_email" type="email" placeholder="email@exemple.com" />

          <label>Mot de passe</label>
          <input id="li_password" type="password" placeholder="••••••••" />

          <button class="btn-secondary" id="btnLogin">Se connecter</button>

          <div style="display:flex; gap:10px; margin-top:12px;">
            <button class="btn-secondary" id="btnReset" style="flex:1;">Mot de passe oublié</button>
            <button class="btn-danger" id="btnLogout" style="flex:1;">Déconnexion</button>
          </div>

          <div id="loginMsg" class="msg muted"></div>
        </div>
      </div>
    </div>

    <div>
      <div class="card" style="margin-bottom: 16px;">
        <div class="hd"><h2>Publier</h2></div>
        <div class="bd">
          <div id="afterAuth" class="hide">
            <label>Caption (optionnel)</label>
            <textarea id="caption" placeholder="Écris un texte..."></textarea>

            <label>Image ou vidéo</label>
            <input id="mediaFile" type="file" accept="image/*,video/*" />

            <button class="btn-green" id="btnPublish" style="margin-top:12px;">Publier</button>
            <div id="pubMsg" class="msg muted"></div>
          </div>

          <div id="notAuth">
            <div style="color:var(--muted); font-weight:850; line-height:1.35;">
              🔒 Connecte-toi pour publier
              <div class="spacer"></div>
              • Partager des images/vidéos
              <div>• Liker les publications</div>
              <div>• Commenter</div>
            </div>
          </div>
        </div>
      </div>

      <div id="feed" class="feed">
        <div class="loading">Chargement des publications...</div>
      </div>
    </div>
  </div>

  <script>
    // Attendre que tout soit chargé
    document.addEventListener('DOMContentLoaded', function() {
      const SUPABASE_URL = "https://wtsmekozfpeaixqobuik.supabase.co";
      const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind0c21la296ZnBlYWl4cW9idWlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4Mjk2MjcsImV4cCI6MjA5MzQwNTYyN30.AUm9renaVr3A8pzDNx5Dm_f4XJrhkIKlnUePm6Gl5S0";
      
      let supabase = null;
      
      try {
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
          auth: { 
            persistSession: true, 
            autoRefreshToken: true,
            detectSessionInUrl: true
          }
        });
      } catch (e) {
        console.error("Erreur Supabase:", e);
        document.getElementById("feed").innerHTML = '<div class="error-msg">⚠️ Erreur de chargement</div>';
        return;
      }

      // Éléments DOM
      const authBadge = document.getElementById("authBadge");
      const feed = document.getElementById("feed");
      
      // Helper functions
      function escapeHtml(s) {
        if (!s) return "";
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      async function getSessionUser() {
        try {
          const { data: { user }, error } = await supabase.auth.getUser();
          if (error || !user) return null;
          return user;
        } catch (e) {
          console.error("Erreur getSessionUser:", e);
          return null;
        }
      }

      async function loadFeed() {
        try {
          const { data: posts, error } = await supabase
            .from("posts")
            .select("*")
            .order("created_at", { ascending: false });

          if (error) throw error;

          if (!posts || posts.length === 0) {
            feed.innerHTML = '<div class="post" style="text-align:center;">📭 Aucune publication</div>';
            return;
          }

          const user = await getSessionUser();
          let html = '';
          
          for (const p of posts) {
            const timeStr = p.created_at ? new Date(p.created_at).toLocaleString() : "";
            const username = p.user_username || "Utilisateur";
            
            html += `
              <div class="post" data-post-id="${p.id}">
                <div class="meta">
                  <div class="author">
                    <div class="avatar">${escapeHtml(username.charAt(0).toUpperCase())}</div>
                    <div>${escapeHtml(username)}</div>
                  </div>
                  <div class="time">${escapeHtml(timeStr)}</div>
                </div>
                ${p.caption ? `<div class="caption">${escapeHtml(p.caption)}</div>` : ""}
                ${p.media_url ? (p.media_type === "video" ? 
                  `<video src="${escapeHtml(p.media_url)}" controls playsinline></video>` : 
                  `<img src="${escapeHtml(p.media_url)}" loading="lazy" />`) : ""}
                <div class="actions">
                  <button class="likeBtn" data-post-id="${p.id}">
                    ❤️ <span class="likes-count">0</span>
                  </button>
                </div>
              </div>
            `;
          }
          
          feed.innerHTML = html;
          
        } catch (error) {
          console.error("Erreur feed:", error);
          feed.innerHTML = `<div class="error-msg">⚠️ Erreur: ${escapeHtml(error.message)}</div>`;
        }
      }

      async function updateUIForUser(user) {
        const afterAuth = document.getElementById("afterAuth");
        const notAuth = document.getElementById("notAuth");
        const signupForm = document.getElementById("signupForm");
        const btnLogout = document.getElementById("btnLogout");
        
        if (user) {
          afterAuth.classList.remove("hide");
          notAuth.classList.add("hide");
          signupForm.classList.add("hide");
          btnLogout.classList.remove("hide");
          authBadge.textContent = `Connecté : ${user.email}`;
        } else {
          afterAuth.classList.add("hide");
          notAuth.classList.remove("hide");
          signupForm.classList.remove("hide");
          btnLogout.classList.add("hide");
          authBadge.textContent = "Non connecté";
        }
      }

      // Événements
      document.getElementById("btnSignup")?.addEventListener("click", async () => {
        const email = document.getElementById("su_email").value.trim();
        const password = document.getElementById("su_password").value;
        const username = document.getElementById("su_username").value.trim();
        const msgDiv = document.getElementById("signupMsg");
        
        if (!email || !password || !username) {
          msgDiv.textContent = "Tous les champs sont requis";
          msgDiv.className = "msg err";
          return;
        }
        
        if (password.length < 6) {
          msgDiv.textContent = "Mot de passe min 6 caractères";
          msgDiv.className = "msg err";
          return;
        }
        
        try {
          msgDiv.textContent = "Création...";
          const { error } = await supabase.auth.signUp({
            email, password,
            options: { data: { username } }
          });
          
          if (error) throw error;
          msgDiv.textContent = "✅ Compte créé ! Vérifiez vos emails";
          msgDiv.className = "msg ok";
        } catch(e) {
          msgDiv.textContent = e.message;
          msgDiv.className = "msg err";
        }
      });

      document.getElementById("btnLogin")?.addEventListener("click", async () => {
        const email = document.getElementById("li_email").value.trim();
        const password = document.getElementById("li_password").value;
        const msgDiv = document.getElementById("loginMsg");
        
        if (!email || !password) {
          msgDiv.textContent = "Email et mot de passe requis";
          msgDiv.className = "msg err";
          return;
        }
        
        try {
          msgDiv.textContent = "Connexion...";
          const { error } = await supabase.auth.signInWithPassword({ email, password });
          if (error) throw error;
          
          msgDiv.textContent = "✅ Connecté !";
          msgDiv.className = "msg ok";
          
          const user = await getSessionUser();
          await updateUIForUser(user);
          await loadFeed();
          
        } catch(e) {
          msgDiv.textContent = e.message;
          msgDiv.className = "msg err";
        }
      });

      document.getElementById("btnLogout")?.addEventListener("click", async () => {
        await supabase.auth.signOut();
        await updateUIForUser(null);
        await loadFeed();
      });

      document.getElementById("btnPublish")?.addEventListener("click", async () => {
        const file = document.getElementById("mediaFile").files[0];
        const caption = document.getElementById("caption").value.trim();
        const msgDiv = document.getElementById("pubMsg");
        
        if (!file) {
          msgDiv.textContent = "Choisissez un fichier";
          msgDiv.className = "msg err";
          return;
        }
        
        const user = await getSessionUser();
        if (!user) {
          msgDiv.textContent = "Connectez-vous d'abord";
          msgDiv.className = "msg err";
          return;
        }
        
        try {
          msgDiv.textContent = "Upload en cours...";
          const fileExt = file.name.split('.').pop();
          const fileName = `${Date.now()}_${Math.random().toString(36).substr(2, 9)}.${fileExt}`;
          const filePath = `${user.id}/${fileName}`;
          
          const { error: uploadError } = await supabase.storage
            .from('media')
            .upload(filePath, file);
            
          if (uploadError) throw uploadError;
          
          const { data: { publicUrl } } = supabase.storage
            .from('media')
            .getPublicUrl(filePath);
          
          const mediaType = file.type.startsWith('image/') ? 'image' : 'video';
          
          const { error: insertError } = await supabase
            .from('posts')
            .insert({
              user_id: user.id,
              user_username: user.email.split('@')[0],
              caption: caption || null,
              media_url: publicUrl,
              media_type: mediaType
            });
            
          if (insertError) throw insertError;
          
          msgDiv.textContent = "✅ Publié !";
          msgDiv.className = "msg ok";
          
          document.getElementById("caption").value = "";
          document.getElementById("mediaFile").value = "";
          
          await loadFeed();
          
        } catch(e) {
          msgDiv.textContent = e.message;
          msgDiv.className = "msg err";
        }
      });

      // Initialisation
      (async () => {
        const user = await getSessionUser();
        await updateUIForUser(user);
        await loadFeed();
      })();
    });
  </script>
</body>
</html>
